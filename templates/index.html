<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNU Studio</title>
    <style>
        :root {
            --primary: #7000A8;
            --primary-hover: #500078;
            --bg: #0f0c1b;
            --card-bg: #1a162e;
            --text: #ffffff;
            --text-muted: #a0a5c0;
            --border: #2d264d;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--border);
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
        }

        @media (min-width: 768px) {
            .workspace {
                grid-template-columns: 350px 1fr;
            }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 6px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .dropzone:hover {
            border-color: var(--primary);
            background: rgba(112, 0, 168, 0.05);
        }

        .dropzone input[type=file] {
            display: none;
        }

        .dropzone p {
            margin: 10px 0 0 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .file-info {
            margin-top: 15px;
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
            word-break: break-all;
        }

        button.btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s ease;
            margin-top: 20px;
        }

        button.btn:hover {
            background: var(--primary-hover);
        }

        button.btn:disabled {
            background: #4a4463;
            color: #837d9c;
            cursor: not-allowed;
        }

        .preview-pane {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border: 1px solid var(--border);
            min-height: 300px;
        }

        .preview-pane h3 {
            margin-top: 0;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 500px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
        }

        .download-btn {
            background: #00b074;
            margin-top: 20px;
            display: none;
            text-decoration: none;
            color: white;
            text-align: center;
            padding: 12px 24px;
            border-radius: 2px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s ease;
        }

        .download-btn:hover {
            background: #008759;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            display: none;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="workspace">
        <div class="control-panel">
            <h1>TUNU Wave Studio</h1>
            <p class="subtitle">Overlay asset elements onto base canvas layers smoothly</p>
            
            <form id="uploadForm">
                <div class="dropzone" onclick="document.getElementById('fileInput').click()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Select base artwork file</p>
                    <input type="file" id="fileInput" name="image" accept="image/*" required onchange="updateFileInfo()">
                </div>
                <div class="file-info" id="fileInfo"></div>
                <button type="submit" class="btn" id="submitBtn">Generate Wave Overlay</button>
            </form>
        </div>

        <div class="preview-pane">
            <h3>Live Canvas Generation Output</h3>
            <div class="loader" id="loader"></div>
            <div class="placeholder-text" id="placeholder">Processed file geometry output targets render directly inside window engine frames below once asset triggers evaluate...</div>
            <canvas id="outputCanvas"></canvas>
            <a href="#" class="download-btn" id="downloadBtn" download="tunu_branded_cover.png">Download Output Canvas</a>
        </div>
    </div>
</div>

<script>
function updateFileInfo() {
    const input = document.getElementById('fileInput');
    const info = document.getElementById('fileInfo');
    if(input.files.length > 0) {
        info.textContent = `Target file: ${input.files[0].name}`;
    }
}

document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) return;

    const formData = new FormData();
    formData.append('image', fileInput.files[0]);

    const loader = document.getElementById('loader');
    const placeholder = document.getElementById('placeholder');
    const canvas = document.getElementById('outputCanvas');
    const downloadBtn = document.getElementById('downloadBtn');
    const submitBtn = document.getElementById('submitBtn');

    loader.style.display = 'block';
    placeholder.style.display = 'none';
    canvas.style.display = 'none';
    downloadBtn.style.display = 'none';
    submitBtn.disabled = true;

    try {
        const response = await fetch('/', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) throw new Error('Generation engine execution breakdown');

        const blob = await response.blob();
        const objectURL = URL.createObjectURL(blob);
        
        const img = new Image();
        img.onload = function() {
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            loader.style.display = 'none';
            canvas.style.display = 'block';
            downloadBtn.style.display = 'inline-block';
            downloadBtn.href = canvas.toDataURL('image/png');
            submitBtn.disabled = false;
        };
        img.src = objectURL;

    } catch (error) {
        alert(error.message);
        loader.style.display = 'none';
        placeholder.style.display = 'block';
        submitBtn.disabled = false;
    }
});
</script>

</body>
</html>
